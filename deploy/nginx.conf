# Nginx 配置 — dreamlog.com 官网
# 放置路径: /etc/nginx/sites-available/dreamlog.com
# 启用: ln -s /etc/nginx/sites-available/dreamlog.com /etc/nginx/sites-enabled/

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name dreamlog.com www.dreamlog.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dreamlog.com www.dreamlog.com;

    # SSL 证书 — 使用 Let's Encrypt 或替换为云厂商证书路径
    ssl_certificate     /etc/letsencrypt/live/dreamlog.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamlog.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源缓存（Next.js standalone 自带，这里做一层 Nginx 缓存加速）
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 反向代理到 Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSR 页面需要等后端 API 返回数据，适当放宽超时
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # 日志
    access_log /var/log/nginx/dreamlog.access.log;
    error_log  /var/log/nginx/dreamlog.error.log;
}
